<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="camGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6B35"/>
      <stop offset="1" stop-color="#F7B32B"/>
    </linearGradient>
  </defs>

  <!-- transparent background -->

  <g transform="translate(100, 100)">
    <!-- back frame -->
    <g transform="rotate(-14) translate(-46,0)">
      <rect x="-72" y="-72" width="144" height="144" rx="22" fill="url(#camGrad)" opacity="0.28"/>
    </g>
    <!-- mid frame -->
    <g transform="rotate(-7) translate(-22,0)">
      <rect x="-72" y="-72" width="144" height="144" rx="22" fill="url(#camGrad)" opacity="0.55"/>
    </g>
    <!-- front frame -->
    <rect x="-72" y="-72" width="144" height="144" rx="22" fill="url(#camGrad)"/>
    <!-- lens ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#FFFFFF" stroke-width="15"/>
    <!-- lens dot -->
    <circle cx="0" cy="0" r="14" fill="#FFFFFF" opacity="0.9"/>
    <!-- focus bracket -->
    <path d="M-54 -54 h20 M-54 -54 v20" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>
